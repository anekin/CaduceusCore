# NPU 架构配置 — Qwen2.5-3B 目标, Weight Cache enabled
# 64×64 Block + WC (PE dual weight reg for gate/up pair merge)

cores: 1

optimizations:
  weight_cache: true           # PE 双 weight 寄存器，gate/up 共享 pipeline fill
  dma_bw_multiplier: 1.0

mxu:
  type: block
  array_height: 64
  array_width: 64
  frequency_mhz: 1000
  weight_precision_bits: 4
  activation_precision_bits: 8
  accumulate_precision_bits: 32
  dataflow: weight_stationary
  double_buffer: true
  ops_per_mac: 2

sram:
  l1_per_core_kb: 512
  l2_shared_kb: 2048
  banks: 16
  read_width_bits: 256
  write_width_bits: 256

sfu:
  width: 128
  pipeline_cycles:
    softmax: 8
    exp: 12
    div: 16
    sqrt: 20
    log: 18
    tanh: 14
    layernorm: 6
    gelu: 4
    relu: 1
    silu: 4
    rope: 12
    maxpool: 3
    avgpool: 3

vector:
  width: 128
  ops:
    add: 1
    mul: 1
    scale: 1
    bias: 1
    relu: 1
    mask: 1

kv_cache:
  sram_kb: 256
  dram_region_mb: 96
  precision_bits: 8

dma:
  channels: 2
  burst_size_bytes: 256
  descriptor_overhead_cycles: 5
  max_pending_descriptors: 16
  num_channels: 2
  per_channel_fifo_depth: 64
  max_burst_length: 8            # AXI burst beats
  multi_block_mode: linked_list  # contiguous | shadow | linked_list
  ll_prefetch_en: true

memory:
  type: LPDDR5-6400
  bandwidth_gbps: 51.2
  bandwidth_bytes_per_cycle: 51.2
  dram_efficiency: 0.85
  tRC_cycles: 48
  tRAS_cycles: 42
  refresh_overhead_percent: 3.0

interconnect:
  type: crossbar
  # ── NoC parameters (flit-level model) ──
  ports: 4
  bandwidth_gbps: 500
  hop_latency_cycles: 3
  flit_width_bits: 256
  vcs: 2
  buffer_depth: 4
  arbitration: round_robin
  routing: destination_tag
  pipeline_stages: 3
  port_bandwidth_gbps: 500    # legacy

riscv:
  isa: RV64IMAFD
  pipeline_stages: 4
  fetch_cycles: 4
  decode_cycles: 1
  dispatch_cycles: 2
