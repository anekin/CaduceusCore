# L1: 权重缓存（PE 双 weight 寄存器）
cores: 1

optimizations:
  weight_cache: true
  dma_bw_multiplier: 1.0

mxu:
  array_height: 128
  array_width: 128
  frequency_mhz: 1000
  weight_precision_bits: 4
  activation_precision_bits: 8
  accumulate_precision_bits: 32
  dataflow: weight_stationary
  double_buffer: true
  ops_per_mac: 2

sram:
  l1_per_core_kb: 512
  l2_shared_kb: 2048
  banks: 16
  read_width_bits: 256
  write_width_bits: 256

sfu:
  width: 128
  pipeline_cycles:
    softmax: 8
    layernorm: 6
    gelu: 4
    relu: 1
    silu: 4
    rope: 12
    maxpool: 3
    avgpool: 3

kv_cache:
  sram_kb: 256
  dram_region_mb: 96
  precision_bits: 8

dma:
  channels: 2
  burst_size_bytes: 256
  descriptor_overhead_cycles: 5
  max_pending_descriptors: 16

memory:
  type: LPDDR5-6400
  bandwidth_gbps: 51.2
  bandwidth_bytes_per_cycle: 51.2
  dram_efficiency: 0.85
  tRC_cycles: 48
  tRAS_cycles: 42
  refresh_overhead_percent: 3.0

interconnect:
  type: crossbar
  port_bandwidth_gbps: 500

riscv:
  isa: RV64IMAFD
  pipeline_stages: 4
  fetch_cycles: 4
  decode_cycles: 1
  dispatch_cycles: 2
