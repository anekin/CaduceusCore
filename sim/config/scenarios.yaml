# DSE 场景定义 — 内存类型、组件清单、对标产品
# 
# 每个场景定义：
#   1. 内存类型 → 自动补全/校验组件清单
#   2. 对标产品 → 扫完后自动交叉校验
#   3. 约束 → TTFT/TPS/面积上限

scenarios:
  lpddr5_3b:
    description: "LPDDR5-64b + 3B 端侧低成本"
    model: "qwen2.5-3b"
    model_params_gb: 1.5    # INT4
    memory:
      type: lpddr5
      bandwidth_gbps: 51.2
      dram_efficiency: 0.85
      effective_bw_gbps: 43.5
    constraints:
      ttft_ms_max: 200
      tps_min: 20
      area_mm2_max: 80
    # 组件清单：场景 A 必须有/没有哪些硬件
    components:
      required: [dram_phy, pcie]       # 外部 DDR 需要 PHY；主机通信需 PCIe
      excluded: [tsv]                    # 无 3D 堆叠
    # 对标产品
    benchmarks:
      - name: "典型手机 NPU (2024)"
        process_nm: 4
        area_mm2: 8
        tops_int8: 35
        note: "Apple A18 ANE / Snapdragon 8 Gen3 NPU"

  onchip_7b:
    description: "On-chip 3D DRAM + 7B 高端端侧"
    model: "qwen2.5-7b"
    model_params_gb: 3.5    # INT4
    memory:
      type: on_chip_3d_dram
      bandwidth_gbps: 500
      capacity_gb: 5
      dram_efficiency: 1.0   # 片上无刷新开销
      effective_bw_gbps: 500
    constraints:
      ttft_ms_max: 200
      tps_min: 100
      area_mm2_max: 100
    components:
      required: [pcie, tsv]              # 主机通信 + 3D 堆叠
      excluded: [dram_phy]               # 无外部 DDR
      tsv_overhead_pct: 0.10
    benchmarks:
      - name: "RK1828"
        process_nm: 22
        area_mm2: 100
        tops_int8: 20
        tps_7b: [59, 180]               # min, max
        note: "瑞芯微 22nm, 20 TOPS"
      - name: "TPUv1 (ISCA 2017)"
        process_nm: 28
        area_mm2: 331
        tops_int8: 92
        note: "systolic — 仅作面积密度参考"

# 内存类型 → 组件清单规则（所有场景共用）
memory_component_rules:
  lpddr5:
    required: [dram_phy, pcie]
    excluded: [tsv]
    tsv_overhead_pct: 0.0
  lpddr5x:
    required: [dram_phy, pcie]
    excluded: [tsv]
    tsv_overhead_pct: 0.0
  on_chip_3d_dram:
    required: [pcie, tsv]
    excluded: [dram_phy]
    tsv_overhead_pct: 0.10
  hbm2e:
    required: [dram_phy, pcie, tsv]      # HBM uses interposer TSVs
    excluded: []
    tsv_overhead_pct: 0.05               # less than 3D DRAM (interposer vs stacked)
  hbm3:
    required: [dram_phy, pcie, tsv]
    excluded: []
    tsv_overhead_pct: 0.05

# 已知产品数据库（交叉校验用）
# process → area 缩放: area_12nm = area * (12/process)^2
product_database:
  rk1828:
    process_nm: 22
    area_mm2: 100
    tops_int8: 20
    architecture: "block (推测)"
    tps_7b_range: [59, 180]
    source: "产品规格书 + 社区实测"
  tpu_v1:
    process_nm: 28
    area_mm2: 331
    tops_int8: 92
    architecture: "256×256 systolic"
    pe_area_um2: 1212          # µm²/MAC @28nm
    source: "ISCA 2017 Jouppi et al."
  a18_ane:
    process_nm: 3
    area_mm2: 12
    tops_int8: 38               # FP16 TOPS, INT8 约等效
    architecture: "Apple ANE (16-core)"
    source: "die shot 分析 (TechInsights/Chipwise)"
